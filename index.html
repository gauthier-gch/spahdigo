<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spahdigo" />
  <link rel="manifest" href="manifest.json" />
  <title>Spahdigo</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── AUTH SCREEN ─────────────────────────────────────────── -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg"></div>
    <div class="auth-container">
      <div class="logo-wrap">
        <h1 class="logo">SPAHDIGO</h1>
        <p class="tagline">Le bar parfait, selon tes amis.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <!-- Login -->
      <div id="login-form" class="auth-form active">
        <input type="email" id="login-email" placeholder="Email" class="input" />
        <input type="password" id="login-password" placeholder="Mot de passe" class="input" />
        <button id="btn-login" class="btn btn-primary">Se connecter</button>
      </div>

      <!-- Register -->
      <div id="register-form" class="auth-form">
        <input type="text" id="reg-name" placeholder="Prénom & Nom" class="input" />
        <input type="email" id="reg-email" placeholder="Email" class="input" />
        <input type="tel" id="reg-phone" placeholder="Téléphone" class="input" />
        <input type="password" id="reg-password" placeholder="Mot de passe" class="input" />
        <button id="btn-register" class="btn btn-primary">Créer mon compte</button>
      </div>

      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <!-- ── MAIN APP ────────────────────────────────────────────── -->
  <div id="app-screen" class="screen">

    <!-- Pages -->
    <div id="page-map"      class="page active"></div>
    <div id="page-social"   class="page"></div>
    <div id="page-analytics" class="page"></div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="map">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Carte</span>
      </button>
      <button class="nav-btn" data-page="social">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Social</span>
      </button>
      <button class="nav-btn" data-page="analytics">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Stats</span>
      </button>
    </nav>
  </div>

  <!-- ── MODAL : Noter un bar ───────────────────────────────── -->
  <div id="modal-rate" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Noter un bar</h2>
        <button class="modal-close" id="close-rate-modal">✕</button>
      </div>
      <div class="modal-body">
        <!-- Bar search -->
        <div id="step-search">
          <input type="text" id="bar-search-input" placeholder="Rechercher un bar..." class="input" />
          <ul id="bar-search-results" class="search-results"></ul>
          <button id="btn-create-bar" class="btn btn-secondary" style="margin-top:12px">
            + Créer un nouveau bar
          </button>
        </div>

        <!-- Create bar -->
        <div id="step-create" class="hidden">
          <h3 class="step-title">Nouveau bar</h3>
          <input type="text" id="new-bar-name" placeholder="Nom du bar" class="input" />
          <input type="text" id="new-bar-address" placeholder="Adresse (ex: 12 rue de Rivoli, Paris)" class="input" />
          <button id="btn-save-new-bar" class="btn btn-primary">Enregistrer & noter</button>
          <button id="btn-back-search" class="btn btn-ghost">← Retour</button>
        </div>

        <!-- Rating -->
        <div id="step-rate" class="hidden">
          <h3 class="step-title" id="rating-bar-name"></h3>
          <div id="criteria-list" class="criteria-list"></div>
          <button id="btn-submit-rating" class="btn btn-primary" style="margin-top:16px">
            Envoyer ma note 🍺
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="js/firebase-config.js"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App scripts -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/map.js"></script>
  <script type="module" src="js/rating.js"></script>
  <script type="module" src="js/social.js"></script>
  <script type="module" src="js/analytics.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
